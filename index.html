<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Access | Verification</title>
    <!-- Подключаем Cloudflare Turnstile API -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        :root {
            --lime: #d4ff00;
            --lime-glow: rgba(212, 255, 0, 0.5);
            --bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        /* Фоновое свечение */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--lime);
            filter: blur(150px);
            opacity: 0.12;
            z-index: 0;
            border-radius: 50%;
        }

        /* Основная карточка */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 50px 30px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
        }

        /* Сканер (старый красивый дизайн) */
        .scanner-visual {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top: 3px solid var(--lime);
            border-radius: 50%;
            animation: rotate 1.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
        }

        .ring-inner {
            position: absolute;
            width: 75%;
            height: 75%;
            border: 2px solid transparent;
            border-bottom: 2px solid var(--lime);
            border-radius: 50%;
            animation: rotate-reverse 1.2s linear infinite;
            opacity: 0.5;
        }

        .core {
            width: 50px;
            height: 50px;
            background: var(--lime);
            border-radius: 16px;
            box-shadow: 0 0 40px var(--lime-glow);
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .core svg {
            width: 28px;
            height: 28px;
            color: #000;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s ease;
        }

        /* Тексты */
        h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Область с Cloudflare (делаем её аккуратной) */
        .cf-area {
            display: flex;
            justify-content: center;
            min-height: 65px;
            transition: opacity 0.5s ease;
        }

        /* Состояние ПОСЛЕ проверки */
        .verified .ring, 
        .verified .ring-inner {
            opacity: 0;
            transform: scale(1.5);
            transition: 0.6s all ease;
        }

        .verified .core {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            transform: translateY(-10px);
        }

        .verified .core svg {
            opacity: 1;
            transform: scale(1.6);
        }

        .verified .cf-area {
            opacity: 0;
            pointer-events: none;
        }

        /* Анимации вращения */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotate-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        /* Мобильная адаптация */
        @media (max-width: 480px) {
            .container {
                width: 95%;
                padding: 40px 20px;
            }
            h1 { font-size: 22px; }
            p { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="blob" style="top: -5%; left: -5%;"></div>
    <div class="blob" style="bottom: -5%; right: -5%; background: #00ffa2;"></div>

    <div class="container" id="widget-card">
        <div class="scanner-visual">
            <div class="ring"></div>
            <div class="ring-inner"></div>
            <div class="core">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
        </div>
        
        <div id="content">
            <h1 id="main-title">Проверка защиты</h1>
            <p id="main-desc">Подождите, мы проверяем безопасность <br>вашего соединения...</p>
        </div>

        <!-- Реальный виджет Cloudflare -->
        <div class="cf-area">
            <!-- ВСТАВЬ СВОЙ КЛЮЧ ТУТ -->
            <div class="cf-turnstile" 
                 data-sitekey="0x4AAAAAACltiVtL3BblyyT3" 
                 data-callback="onCloudflareSuccess" 
                 data-theme="dark">
            </div>
        </div>
    </div>

    <script>
        // Эта функция вызывается автоматически, когда Cloudflare одобрил пользователя
        function onCloudflareSuccess(token) {
            const card = document.getElementById('widget-card');
            const title = document.getElementById('main-title');
            const desc = document.getElementById('main-desc');

            // Запускаем красивую анимацию перехода
            card.classList.add('verified');
            
            // Меняем текст на "Успех"
            setTimeout(() => {
                title.innerText = 'Доступ разрешен';
                desc.innerHTML = 'Проверка пройдена успешно. <br>Входим в систему...';
                
                // Здесь можно сделать редирект:
                // window.location.href = "/dashboard";
            }, 300);

            console.log("Cloudflare Verified. Token:", token);
        }
    </script>
</body>
</html>
